{% extends "base.html" %}

{% block title %}Page Not Found - 404 Error{% endblock %}

{% block content %}
<div class="container fade-in py-5 text-center">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card-custom p-5">
        <div class="text-danger mb-4">
          <i class="bi bi-exclamation-octagon-fill" style="font-size: 5rem;"></i>
        </div>
        <h1 class="fw-bold display-4 mb-3">404 Error</h1>
        <h3 class="fw-semibold mb-3">Page Not Found</h3>
        <p class="text-secondary mb-4">
          We couldn't locate the developmental metrics or pages you requested. Verify your address and try again.
        </p>
        <a href="{{ url_for('home') }}" class="btn btn-gradient btn-lg">
          <i class="bi bi-house-door-fill me-2"></i> Return to Homepage
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
